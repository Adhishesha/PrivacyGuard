{% extends "base.html" %}
{% block title %}Register — PrivacyGuard{% endblock %}

{% block content %}
<div class="auth-card auth-card-wide">
  <div class="auth-logo">
    <i class="fa-solid fa-user-plus fa-2x"></i>
    <h1>Create Account</h1>
    <p>Join PrivacyGuard</p>
  </div>

  <form method="POST" action="{{ url_for('auth.register') }}" class="form" id="reg-form">
    <div class="form-row">
      <div class="form-group">
        <label for="username"><i class="fa fa-user"></i> Username</label>
        <input type="text" id="username" name="username" class="form-input"
               placeholder="Choose a username" required />
      </div>
      <div class="form-group">
        <label for="password"><i class="fa fa-lock"></i> Password</label>
        <input type="password" id="password" name="password" class="form-input"
               placeholder="Choose a password" required />
      </div>
    </div>

    <div class="form-group">
      <label for="role"><i class="fa fa-id-badge"></i> Role</label>
      <div class="role-selector">
        <label class="role-tile" onclick="selectRole('student')">
          <input type="radio" name="role" value="student" id="role-student" />
          <i class="fa fa-graduation-cap fa-lg"></i>
          <span>Student</span>
        </label>
        <label class="role-tile" onclick="selectRole('requester')">
          <input type="radio" name="role" value="requester" id="role-requester" checked />
          <i class="fa fa-chalkboard-teacher fa-lg"></i>
          <span>Faculty / Staff</span>
        </label>
      </div>
    </div>

    <!-- Student-only fields -->
    <div id="student-fields" style="display:none">
      <hr class="divider" />
      <p class="section-label"><i class="fa fa-graduation-cap"></i> Student Details</p>
      <div class="form-row">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" name="name" class="form-input" placeholder="Your legal name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" class="form-input" placeholder="student@college.edu" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Department</label>
          <select name="department" class="form-input">
            <option value="">Select Department</option>
            <option>Computer Science</option>
            <option>Electronics</option>
            <option>Mechanical Engineering</option>
            <option>Civil Engineering</option>
            <option>Information Technology</option>
            <option>Business Administration</option>
            <option>Data Science</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Year</label>
          <select name="year" class="form-input">
            <option value="1">Year 1</option>
            <option value="2">Year 2</option>
            <option value="3">Year 3</option>
            <option value="4">Year 4</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Phone</label>
          <input type="text" name="phone" class="form-input" placeholder="+91 98765 43210" />
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="date" name="dob" class="form-input" />
        </div>
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" name="address" class="form-input" placeholder="Residential address" />
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-full">
      <i class="fa fa-check"></i> Create Account
    </button>
  </form>

  <p class="auth-footer">
    Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
  </p>
</div>

<script>
function selectRole(role) {
  const sf = document.getElementById('student-fields');
  sf.style.display = role === 'student' ? 'block' : 'none';
  document.querySelectorAll('.role-tile').forEach(t => t.classList.remove('selected'));
  event.currentTarget.closest('.role-tile').classList.add('selected');
  sf.querySelectorAll('input, select').forEach(inp => {
    inp.required = role === 'student' && ['name','email'].includes(inp.name);
  });
}
// Default highlight
document.querySelector('.role-tile:last-child').classList.add('selected');
</script>
{% endblock %}
